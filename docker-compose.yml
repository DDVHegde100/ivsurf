services:
  ui:
    build: .
    image: ivsurf:latest
    container_name: ivsurf-ui
    ports:
      - "${IVSURF_UI_PORT:-8501}:8501"
    env_file:
      - path: .env
        required: false
    environment:
      IVSURF_DB_PATH: /app/data/ivsurf.db
      IVSURF_DATA_DIR: /app/data
    volumes:
      - ivsurf_data:/app/data
    command:
      - streamlit
      - run
      - scripts/ivsurf_retro_terminal.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --browser.gatherUsageStats=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  api:
    build: .
    image: ivsurf:latest
    container_name: ivsurf-api
    ports:
      - "${IVSURF_API_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      IVSURF_DB_PATH: /app/data/ivsurf.db
      IVSURF_DATA_DIR: /app/data
    volumes:
      - ivsurf_data:/app/data
    command:
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  ivsurf_data:
